<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corrida das Cores</title>
    <link rel="stylesheet" href="./minigame1.css" />
  </head>
  <body>
    <div class="navbar">
      <button class="button-forgive">
        <a href="../../home/index.home.html">Forgive</a>
      </button>
    </div>

    <h4>
      Vote em um dos circulos para ganhar a corrida, o objetivo é observar
      <br />
      a corrida até o final e ver se adivinhou corretamento o vencedor.<br />Boa
      sorte.
    </h4>

    <h2>Vote em um dos círculos</h2>

    <div class="pista">
      <div class="linha">
        <div class="bola azul"></div>
      </div>
      <div class="linha">
        <div class="bola amarela"></div>
      </div>
      <div class="linha">
        <div class="bola roxa"></div>
      </div>
    </div>

    <div class="botaoCorrida">
      <button onclick="iniciarCorrida('azul')">Azul</button>
      <button onclick="iniciarCorrida('amarela')">Amarela</button>
      <button onclick="teste()">Roxa</button>
    </div>


    <script src="./minigame1.js"></script>
  </body>
</html>
