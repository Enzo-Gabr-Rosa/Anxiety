<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corrida das Cores</title>
    <link rel="stylesheet" href="../../../src/styles/minigame.css"/>
  </head>
  <body>
    <div class="navbar">
      <button class="button-forgive">
        <a href="../../home/index.home.html">Forgive</a>
      </button>
    </div>

    <h4>
      Pick one of the circles, you need to pay atention
      <br />
      untill the end and see if you guessed correctly.
      <br/><br/>
      Good luck!
    </h4>

    <div class="track">
      <div class="line">
        <div class="ball blue"></div>
      </div>
      <div class="line">
        <div class="ball yellow"></div>
      </div>
      <div class="line">
        <div class="ball purple"></div>
      </div>
    </div>

    <div>
      <button class="blue button-race" onclick="startRace('blue')"></button>
      <button class="yellow button-race" onclick="startRace('yellow')"></button>
      <button class="purple button-race" onclick="startRace('purple')"></button>
    </div>

    <button id="next1" class="button-continue" disabled >Continue</button>

    <script src="./minigame1.js"></script>
  </body>
</html>
